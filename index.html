<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Dice Duel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#080610; --surf:#110e1c; --card:#16122a; --card2:#1c1735; --elev:#231d3d;
  --brd:rgba(255,255,255,.06); --brd2:rgba(255,255,255,.12);
  --tx:#f1f0f5; --tx2:#8a82a0; --tx3:#5a5272;
  --red:#ff4757; --green:#2ed573; --green-d:#1ca854;
  --blue:#3b82f6; --amber:#f59e0b; --amber-d:#a36d00;
  --purple:#a855f7; --purple-d:#7e22ce; --orange:#f97316;
  --font:'Outfit',sans-serif; --mono:'JetBrains Mono',monospace;
  /* Responsive tokens — mobile first */
  --pad: 12px;
  --gap: 8px;
  --die-size: 44px;
  --card-h: 90px;
  --btn-h: 30px;
  --fs-title: 16px;
  --fs-body: 12px;
  --fs-small: 9px;
  --fs-dice-num: 18px;
  --fs-mult: 11px;
  --fs-roll: 16px;
  --fs-balance: 12px;
  --fs-dice-count: 18px;
  --radius: 14px;
}
/* Tablet (480px+) */
@media(min-width:480px){:root{
  --pad:16px;--gap:10px;--die-size:56px;--card-h:110px;--btn-h:36px;
  --fs-title:19px;--fs-body:13px;--fs-small:10px;--fs-dice-num:20px;
  --fs-mult:13px;--fs-roll:18px;--fs-balance:14px;--fs-dice-count:22px;--radius:16px;
}}
/* Desktop (768px+) */
@media(min-width:768px){:root{
  --pad:16px;--gap:10px;--die-size:44px;--card-h:100px;--btn-h:38px;
  --fs-title:20px;--fs-body:13px;--fs-small:10px;--fs-dice-num:20px;
  --fs-mult:13px;--fs-roll:18px;--fs-balance:15px;--fs-dice-count:24px;--radius:16px;
}}
/* Large desktop (1024px+) */
@media(min-width:1024px){:root{
  --pad:18px;--gap:10px;--die-size:44px;--card-h:100px;--btn-h:40px;
  --fs-title:21px;--fs-body:14px;--fs-small:11px;--fs-dice-num:20px;
  --fs-mult:14px;--fs-roll:19px;--fs-balance:16px;--fs-dice-count:26px;--radius:16px;
}}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{min-height:100dvh;background:var(--bg);color:var(--tx);font-family:var(--font);display:flex;justify-content:center;-webkit-font-smoothing:antialiased;overflow-x:hidden;
  background-image:radial-gradient(ellipse 90% 40% at 50% -5%,rgba(100,50,200,.1),transparent 60%),radial-gradient(ellipse 50% 30% at 85% 100%,rgba(255,71,87,.04),transparent)}
#R{width:100%;max-width:520px;padding:0 var(--pad) 24px}
@media(min-width:768px){#R{max-width:560px}}

/* All sections stack vertically at every size */
.arena{display:flex;flex-direction:column;gap:var(--gap);margin-bottom:var(--gap)}
.controls-row{display:flex;flex-direction:column;gap:var(--gap);margin-bottom:var(--gap)}

/* Animations */
@keyframes dk{0%{transform:rotate(-10deg) scale(1.08)}100%{transform:rotate(10deg) scale(.92)}}
@keyframes pop{0%{transform:scale(.3);opacity:0}60%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
@keyframes wp{0%,100%{text-shadow:0 0 6px rgba(46,213,115,.15)}50%{text-shadow:0 0 30px rgba(46,213,115,.45)}}
@keyframes shm{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes su{0%{transform:translateY(14px);opacity:0}100%{transform:translateY(0);opacity:1}}
@keyframes fi{0%{opacity:0}100%{opacity:1}}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes bg{0%,100%{border-color:rgba(46,213,115,.1)}50%{border-color:rgba(46,213,115,.3)}}
@keyframes sIn{0%{transform:scale(.92);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes winGlow{0%,100%{box-shadow:0 0 12px rgba(46,213,115,.15),inset 0 0 20px rgba(46,213,115,.03)}50%{box-shadow:0 0 28px rgba(46,213,115,.3),inset 0 0 30px rgba(46,213,115,.06)}}
@keyframes loseGlow{0%,100%{box-shadow:0 0 8px rgba(255,71,87,.1)}50%{box-shadow:0 0 20px rgba(255,71,87,.2)}}
@keyframes tieGlow{0%,100%{box-shadow:0 0 8px rgba(245,158,11,.1)}50%{box-shadow:0 0 20px rgba(245,158,11,.2)}}

/* Components */
.cd{background:var(--card);border:1px solid var(--brd);border-radius:var(--radius);box-shadow:0 4px 20px rgba(0,0,0,.35);transition:all .25s ease}
.cd:hover{border-color:var(--brd2);box-shadow:0 6px 24px rgba(0,0,0,.4)}
.lb{font-size:var(--fs-small);font-weight:700;color:var(--tx3);letter-spacing:1.5px;text-align:center;text-transform:uppercase}
.mn{font-family:var(--mono)}
.bt{border:none;cursor:pointer;font-family:var(--font);user-select:none;-webkit-tap-highlight-color:transparent;transition:all .2s ease}
.bt:hover{filter:brightness(1.12);transform:translateY(-1px)}
.bt:active{transform:scale(.94);filter:brightness(.95)}.bt:disabled{cursor:not-allowed;pointer-events:none;filter:none}
.ct{min-width:var(--btn-h);height:var(--btn-h);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:var(--fs-body);background:var(--elev);color:var(--tx);border:1px solid var(--brd);padding:0 4px;transition:all .15s ease}
.ct:hover{background:var(--card2);border-color:var(--brd2);transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.3)}

/* Dice selector hover */
.dc-btn{transition:all .2s ease}
.dc-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.4);filter:brightness(1.1)}

/* Special bet hover */
.sp-btn{transition:all .2s ease}
.sp-btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.3);filter:brightness(1.15)}

/* Roll button hover */
.roll-btn:hover:not(:disabled){box-shadow:0 8px 36px rgba(46,213,115,.35),inset 0 1px 0 rgba(255,255,255,.2)!important;transform:translateY(-2px)!important}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield}
input[type=number]:focus{border-color:var(--brd2);box-shadow:0 0 0 2px rgba(124,58,237,.2)}

/* Dice — responsive sizes */
.die{border-radius:18%;display:flex;align-items:center;justify-content:center;width:var(--die-size);height:var(--die-size)}
.die-r{background:linear-gradient(145deg,#ff4757,#d63031);box-shadow:2px 4px 12px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.18),0 0 14px rgba(255,71,87,.12)}
.die-w{background:linear-gradient(145deg,#f5f5f5,#d8d8d8);box-shadow:2px 4px 12px rgba(0,0,0,.5),inset 0 2px 0 rgba(255,255,255,.7)}
.ph{width:var(--die-size);height:var(--die-size);border-radius:18%;border:2px dashed;opacity:.25}
.rl{animation:dk .1s infinite alternate}

/* Overlay */
.ov{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.78);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);animation:fi .2s;padding:var(--pad)}
.ac{background:linear-gradient(145deg,var(--card),var(--surf));border:1px solid var(--brd2);border-radius:var(--radius);padding:var(--pad);max-width:440px;width:100%;text-align:center;box-shadow:0 24px 80px rgba(0,0,0,.6);animation:pop .35s cubic-bezier(.34,1.56,.64,1);max-height:88vh;overflow-y:auto}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.15)}
</style>
</head>
<body>
<div id="R"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const{useState,useEffect,useCallback,useMemo}=React;

/* ── Dice Face ── */
function DF({value,color}){
  const P={1:[[50,50]],2:[[27,27],[73,73]],3:[[27,27],[50,50],[73,73]],4:[[27,27],[73,27],[27,73],[73,73]],5:[[27,27],[73,27],[50,50],[27,73],[73,73]],6:[[27,22],[73,22],[27,50],[73,50],[27,78],[73,78]]};
  const d=P[value]||[],f=color==="r"?"white":"#12101e";
  return(
    <div className={"die "+(color==="r"?"die-r":"die-w")}>
      <svg viewBox="0 0 100 100" style={{width:"70%",height:"70%"}}>
        {d.map(([x,y],i)=><circle key={i} cx={x} cy={y} r={9} fill={f} opacity={.9}/>)}
      </svg>
    </div>
  );
}

/* ── Animated Die ── */
function AD({fv,color,delay=0,rolling}){
  const[v,sV]=useState(fv||1);
  useEffect(()=>{
    if(!rolling){if(fv)sV(fv);return;}
    const iv=setInterval(()=>sV(Math.floor(Math.random()*6)+1),50);
    const to=setTimeout(()=>{clearInterval(iv);if(fv)sV(fv);},1100+delay);
    return()=>{clearInterval(iv);clearTimeout(to);};
  },[rolling,fv,delay]);
  return(
    <div className={rolling?"rl":""} style={{transition:rolling?"none":"transform .3s cubic-bezier(.34,1.56,.64,1)"}}>
      <DF value={v} color={color}/>
    </div>
  );
}

/* ── Game Information Modal ── */
function HowTo({onClose}){
  return(
    <div className="ov" onClick={onClose}>
      <div className="ac" style={{textAlign:"left",maxWidth:440}} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"var(--pad)"}}>
          <h2 style={{fontSize:"var(--fs-title)",fontWeight:900}}>Game Information</h2>
          <button className="bt" onClick={onClose} style={{width:"var(--btn-h)",height:"var(--btn-h)",borderRadius:8,background:"var(--elev)",color:"var(--tx2)",fontSize:"var(--fs-body)",display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
        </div>

        <div style={{fontSize:"var(--fs-body)",fontWeight:800,color:"var(--red)",marginBottom:"var(--gap)"}}>Risk Levels</div>
        {[
          {label:"High Risk",c:"var(--red)",bg:"rgba(255,71,87,.15)",border:"rgba(255,71,87,.3)",dice:"1 Die",mult:"10.26x Multiplier"},
          {label:"Medium Risk",c:"var(--amber)",bg:"rgba(245,158,11,.12)",border:"rgba(245,158,11,.25)",dice:"2 Dice",mult:"2.14x Multiplier"},
          {label:"Low Risk",c:"var(--green)",bg:"rgba(46,213,115,.12)",border:"rgba(46,213,115,.25)",dice:"3 Dice",mult:"1.22x Multiplier"},
        ].map((r,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"var(--gap) var(--pad)",marginBottom:6,borderRadius:10,background:"var(--elev)",border:"1px solid var(--brd)"}}>
            <span style={{fontSize:"var(--fs-small)",fontWeight:700,color:r.c,background:r.bg,border:"1px solid "+r.border,borderRadius:6,padding:"3px 10px"}}>{r.label}</span>
            <span style={{fontSize:"var(--fs-small)",color:"var(--tx2)",fontWeight:600}}>{r.dice} · {r.mult}</span>
          </div>
        ))}

        <div style={{fontSize:"var(--fs-body)",fontWeight:800,color:"var(--purple)",marginTop:"var(--pad)",marginBottom:"var(--gap)"}}>Bonus Multipliers</div>
        {[
          {label:"All Same (2 Dice)",mult:"5.7x Multiplier",bg:"rgba(168,85,247,.1)",border:"rgba(168,85,247,.25)"},
          {label:"All Same (3 Dice)",mult:"34.2x Multiplier",bg:"rgba(245,158,11,.1)",border:"rgba(245,158,11,.25)"},
        ].map((b,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"var(--gap) var(--pad)",marginBottom:6,borderRadius:10,background:"var(--elev)",border:"1px solid var(--brd)"}}>
            <span style={{fontSize:"var(--fs-small)",fontWeight:700,color:i===0?"var(--purple)":"var(--amber)",background:b.bg,border:"1px solid "+b.border,borderRadius:6,padding:"3px 10px"}}>{b.label}</span>
            <span className="mn" style={{fontSize:"var(--fs-body)",fontWeight:800,color:"var(--tx)"}}>{b.mult}</span>
          </div>
        ))}

        <div style={{fontSize:"var(--fs-body)",fontWeight:800,color:"var(--red)",marginTop:"var(--pad)",marginBottom:"var(--gap)"}}>Tie</div>
        <div style={{padding:"var(--gap) var(--pad)",borderRadius:10,background:"var(--elev)",border:"1px solid var(--brd)",fontSize:"var(--fs-body)",color:"var(--tx2)",lineHeight:1.6}}>
          If your total equals the dealer's total, <strong style={{color:"var(--red)"}}>you lose your bet</strong>. The dealer wins all ties.
        </div>

        <div style={{fontSize:"var(--fs-body)",fontWeight:800,color:"var(--green)",marginTop:"var(--pad)",marginBottom:"var(--gap)"}}>Insurance</div>
        <div style={{padding:"var(--gap) var(--pad)",borderRadius:10,background:"var(--elev)",border:"1px solid var(--brd)",fontSize:"var(--fs-body)",color:"var(--tx2)",lineHeight:1.6}}>
          Costs <strong style={{color:"var(--tx)"}}>5%</strong> of your bet. If the result is a tie, insurance returns <strong style={{color:"var(--green)"}}>25% of your bet</strong> instead of losing it all.
        </div>

        <div style={{marginTop:"var(--pad)",padding:"var(--gap) var(--pad)",borderRadius:10,background:"rgba(168,85,247,.06)",border:"1px solid rgba(168,85,247,.12)",fontSize:"var(--fs-small)",color:"var(--tx2)",lineHeight:1.5}}>
          <strong style={{color:"var(--purple)"}}>Note:</strong> Bonus Bet is only available when playing with 2 or 3 dice. All your dice must land on the same number to win the bonus.
        </div>

        <button className="bt" onClick={onClose} style={{width:"100%",padding:"var(--gap)",borderRadius:"var(--radius)",fontSize:"var(--fs-body)",fontWeight:800,color:"white",background:"linear-gradient(135deg,#7C3AED,var(--purple))",boxShadow:"0 4px 16px rgba(124,58,237,.3)",marginTop:"var(--pad)"}}>
          Got It
        </button>
      </div>
    </div>
  );
}

/* ── Stats Bar ── */
function Stats({hist}){
  const w=hist.filter(h=>h.out==="win").length;
  const l=hist.filter(h=>h.out==="lose").length;
  const t=hist.filter(h=>h.out==="tie").length;
  const n=hist.length;
  const pct=n?Math.round(w/n*100):0;
  // Net profit = sum of (what you received back - what you bet) for each round
  const profit=hist.reduce((a,h)=>a+(h.pay-h.bet),0);
  const profitRound=Math.round(profit*100)/100;
  return(
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"var(--gap)",marginBottom:"var(--gap)"}}>
      {/* Win rate card */}
      <div style={{background:"var(--elev)",borderRadius:10,padding:"var(--gap) var(--pad)"}}>
        <div style={{fontSize:"var(--fs-small)",fontWeight:700,color:"var(--tx3)",letterSpacing:1.5,textTransform:"uppercase",marginBottom:4}}>Win Rate</div>
        <div style={{display:"flex",alignItems:"baseline",gap:4}}>
          <span className="mn" style={{fontSize:"var(--fs-dice-num)",fontWeight:900,color:pct>=50?"var(--green)":"var(--red)"}}>{pct}%</span>
          <span style={{fontSize:"var(--fs-small)",color:"var(--tx3)",fontWeight:600}}>{w}W·{l}L·{t}T</span>
        </div>
        <div style={{width:"100%",height:3,borderRadius:2,background:"rgba(255,255,255,.06)",marginTop:4,overflow:"hidden"}}>
          <div style={{display:"flex",height:"100%"}}>
            {w>0&&<div style={{width:(w/Math.max(n,1)*100)+"%",background:"var(--green)",borderRadius:2}}/>}
            {t>0&&<div style={{width:(t/Math.max(n,1)*100)+"%",background:"var(--amber)"}}/>}
            {l>0&&<div style={{width:(l/Math.max(n,1)*100)+"%",background:"var(--red)",borderRadius:"0 2px 2px 0"}}/>}
          </div>
        </div>
      </div>
      {/* Profit card */}
      <div style={{background:"var(--elev)",borderRadius:10,padding:"var(--gap) var(--pad)"}}>
        <div style={{fontSize:"var(--fs-small)",fontWeight:700,color:"var(--tx3)",letterSpacing:1.5,textTransform:"uppercase",marginBottom:4}}>Net Profit</div>
        <div>
          <span className="mn" style={{fontSize:"var(--fs-dice-num)",fontWeight:900,color:profitRound>=0?"var(--green)":"var(--red)"}}>{profitRound>=0?"+":""}${Math.abs(profitRound).toFixed(2)}</span>
        </div>
        <div style={{fontSize:"var(--fs-small)",color:"var(--tx3)",fontWeight:600,marginTop:2}}>{n} rounds</div>
      </div>
    </div>
  );
}

/* ══ MAIN ══ */
function Game(){
  const[bal,setBal]=useState(9137.76);
  const[bet,setBet]=useState(10);
  const[dc,setDc]=useState(1);
  const[ins,setIns]=useState(false);
  const[bon,setBon]=useState(false);
  const[bonA,setBonA]=useState(5);
  const[rl,setRl]=useState(false);
  const[ph,setPh]=useState("idle");
  const[dD,sDD]=useState([null,null]);
  const[pD,sPD]=useState([null]);
  const[res,sRes]=useState(null);
  const[wA,sWA]=useState(0);
  const[hist,sHist]=useState([]);
  const[alrt,sAlrt]=useState(false);
  const[how,sHow]=useState(false);

  const M={1:10.26,2:2.14,3:1.22};             // 5% house edge, tie=loss
  const BONUS_MULT={2:5.7,3:34.2};            // 5% house edge on bonus bets
  const INS_RATE=0.05;                         // Insurance cost: 5% of bet
  const maxBon=Math.max(1,Math.floor(bet/2));
  const effectiveBonA=Math.min(bonA,maxBon);
  const bonAvailable=dc>=2;
  const tBet=useMemo(()=>{let t=bet;if(ins)t+=bet*INS_RATE;if(bon&&bonAvailable)t+=effectiveBonA;return Math.round(t*100)/100;},[bet,ins,bon,bonAvailable,effectiveBonA]);
  const can=bal>=tBet&&tBet>0&&ph==="idle";

  useEffect(()=>{if(dc===1&&bon)setBon(false);},[dc]);

  useEffect(()=>{if(ph==="idle")sPD(Array(dc).fill(null));},[dc,ph]);

  const doRoll=useCallback(()=>{
    if(bal<tBet||bal<=0){sAlrt(true);return;}
    if(!can)return;
    setRl(true);setPh("rolling");sRes(null);sWA(0);
    setBal(b=>Math.round((b-tBet)*100)/100);
    const dd=[Math.floor(Math.random()*6)+1,Math.floor(Math.random()*6)+1];
    const pd=Array.from({length:dc},()=>Math.floor(Math.random()*6)+1);
    sDD(dd);sPD(pd);
    setTimeout(()=>{
      setRl(false);setPh("result");
      const dt=dd[0]+dd[1];
      const pt=pd.reduce((a,b)=>a+b,0);
      let out,pay=0,bonusWin=false,bonusPay=0;

      // Main bet result — TIE IS A LOSS
      if(pt>dt){out="win";pay=bet*M[dc];}
      else if(pt===dt){out="tie";pay=ins?Math.round(bet*0.25*100)/100:0;}  // Insurance: 25% back on tie
      else{out="lose";pay=0;}

      // Bonus bet — independent from main result
      // Wins if ALL player dice show same number (2+ dice required)
      const curMaxBon=Math.max(1,Math.floor(bet/2));
      const curBonA=Math.min(bonA,curMaxBon);
      if(bon&&dc>=2&&pd.length>=2&&pd.every(d=>d===pd[0])){
        bonusWin=true;
        bonusPay=curBonA*BONUS_MULT[dc];
        pay+=bonusPay;
      }

      pay=Math.round(pay*100)/100;
      sRes(out);sWA(pay);
      // Store bonus info for display
      sHist(h=>[{dt,pt,out,pay,bet:tBet,dc,num:h.length+1,bonusWin,bonusPay:Math.round(bonusPay*100)/100},...h]);
      if(pay>0)setBal(b=>Math.round((b+pay)*100)/100);
      setTimeout(()=>{
        setPh("idle");sRes(null);sDD([null,null]);sPD(Array(dc).fill(null));
        setBal(b=>{if(b<=0)setTimeout(()=>sAlrt(true),200);return b;});
      },2000);
    },1400);
  },[can,tBet,dc,bet,ins,bon,bonA,bonAvailable,bal]);

  useEffect(()=>{const fn=e=>{if(e.code==="Space"){e.preventDefault();if(ph==="idle")doRoll();}};window.addEventListener("keydown",fn);return()=>window.removeEventListener("keydown",fn);},[ph,doRoll]);

  const rc=res==="win"?"var(--green)":res==="tie"&&ins&&wA>0?"var(--amber)":"var(--red)";

  return(
  <>
    {/* ═══ HEADER ═══ */}
    <header style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"var(--pad) 0",gap:"var(--gap)"}}>
      <div style={{display:"flex",alignItems:"center",gap:"var(--gap)"}}>
        <div>
          <h1 style={{fontSize:"var(--fs-title)",fontWeight:900,letterSpacing:1.5,lineHeight:1}}>DICE DUEL</h1>
          <p style={{fontSize:"var(--fs-small)",color:"var(--tx3)",fontWeight:500,marginTop:2}}>Fast-Paced Casino Game</p>
        </div>
        <button className="bt" onClick={()=>sHow(true)} aria-label="How to play" style={{width:22,height:22,borderRadius:"50%",border:"1.5px solid var(--brd2)",background:"transparent",color:"var(--tx3)",fontSize:"var(--fs-small)",fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center"}}>?</button>
      </div>
      <div className="cd" style={{padding:"6px var(--pad)",display:"flex",alignItems:"center",gap:"var(--gap)",borderRadius:12}}>
        <div style={{width:24,height:24,borderRadius:7,background:"linear-gradient(135deg,var(--blue),#2563eb)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"var(--fs-small)",fontWeight:900,flexShrink:0}}>$</div>
        <div>
          <div style={{fontSize:"var(--fs-small)",color:"var(--tx3)",fontWeight:600,lineHeight:1}}>Balance</div>
          <div className="mn" style={{fontSize:"var(--fs-balance)",fontWeight:800,lineHeight:1.3,whiteSpace:"nowrap"}}>${bal.toLocaleString("en-US",{minimumFractionDigits:2})}</div>
        </div>
      </div>
    </header>

    {/* ═══ 1. GAME ARENA — vertical: Dealer → You → Roll ═══ */}
    <div className="arena">
      {/* Dealer */}
        <div className="cd" style={{padding:"var(--pad)",textAlign:"center",height:"var(--card-h)",display:"flex",flexDirection:"column",overflow:"hidden",
          borderTop:ph==="result"&&dD[0]?(res==="win"?"2px solid rgba(255,71,87,.4)":res==="tie"?"2px solid rgba(245,158,11,.4)":"2px solid rgba(46,213,115,.5)"):"2px solid transparent",
          animation:ph==="result"?(res==="win"?"loseGlow 1.5s ease infinite":res==="tie"?"tieGlow 1.5s ease infinite":"winGlow 1.5s ease infinite"):"none",
          background:ph==="result"?(res==="win"?"linear-gradient(180deg,rgba(255,71,87,.04),var(--card))":res==="tie"?"linear-gradient(180deg,rgba(245,158,11,.04),var(--card))":"linear-gradient(180deg,rgba(46,213,115,.06),var(--card))"):"var(--card)"}}>
          <div className="lb" style={{color:ph==="result"?(res==="win"?"var(--red)":res==="tie"?"var(--amber)":"var(--green)"):"var(--red)",marginBottom:6,flexShrink:0}}>{ph==="result"&&res==="lose"?"DEALER WINS":ph==="result"&&res==="tie"?"TIE":"DEALER"}</div>
          <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:"var(--gap)"}}>
            {dD[0]!==null?(
              <><AD fv={dD[0]} color="r" delay={0} rolling={rl}/><AD fv={dD[1]} color="r" delay={100} rolling={rl}/></>
            ):(
              <><div className="ph" style={{borderColor:"var(--red)"}}/><div className="ph" style={{borderColor:"var(--red)"}}/></>
            )}
            {ph==="result"&&dD[0]!==null&&(
              <span className="mn" style={{fontSize:"var(--fs-dice-num)",fontWeight:800,color:"var(--tx2)",animation:"su .2s ease",marginLeft:6}}>{dD[0]+dD[1]}</span>
            )}
          </div>
        </div>

        {/* Player */}
        <div className="cd" style={{padding:"var(--pad)",textAlign:"center",height:"var(--card-h)",display:"flex",flexDirection:"column",overflow:"hidden",
          borderTop:ph==="result"&&res?(res==="win"?"2px solid rgba(46,213,115,.5)":res==="tie"?"2px solid rgba(245,158,11,.4)":"2px solid rgba(255,71,87,.4)"):"2px solid transparent",
          animation:ph==="result"&&res==="win"?"winGlow 1.5s ease infinite":ph==="result"&&res==="lose"?"loseGlow 1.5s ease infinite":ph==="result"&&res==="tie"?"tieGlow 1.5s ease infinite":"none",
          background:ph==="result"&&res==="win"?"linear-gradient(180deg,rgba(46,213,115,.06),var(--card))":ph==="result"&&res==="lose"?"linear-gradient(180deg,rgba(255,71,87,.04),var(--card))":ph==="result"&&res==="tie"?"linear-gradient(180deg,rgba(245,158,11,.04),var(--card))":"var(--card)"}}>
          <div className="lb" style={{color:ph==="result"&&res==="win"?"var(--green)":ph==="result"?"var(--tx3)":"var(--tx3)",marginBottom:6,flexShrink:0}}>{ph==="result"&&res==="win"?"YOU WIN!":"YOU"}</div>
          <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
            {[0,1,2].map(i=>{
              const show=i<dc;
              const val=pD[i];
              if(!show) return null;
              return val!==null
                ?<AD key={i} fv={val} color="w" delay={i*70} rolling={rl}/>
                :<div key={i} className="ph" style={{borderColor:"rgba(255,255,255,.12)"}}/>;
            })}
            {ph==="result"&&res&&(
              <div style={{marginLeft:8,animation:"pop .35s cubic-bezier(.34,1.56,.64,1)",display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                <span className="mn" style={{fontSize:"var(--fs-dice-num)",fontWeight:800,color:"var(--tx2)"}}>{pD.slice(0,dc).reduce((a,b)=>a+b,0)}</span>
                <span style={{fontSize:"var(--fs-body)",fontWeight:900,letterSpacing:1,color:rc,animation:res==="win"?"wp 1.5s ease infinite":"none"}}>
                  {res==="win"?"WIN!":res==="tie"?(ins?"TIE":"TIE"):"LOSE"}
                </span>
                {res==="win"&&wA>0&&<span className="mn" style={{fontSize:"var(--fs-body)",fontWeight:700,color:"var(--green)"}}>+${wA.toFixed(2)}</span>}
                {res==="tie"&&ins&&wA>0&&<span style={{fontSize:"var(--fs-small)",fontWeight:700,color:"var(--amber)",background:"rgba(245,158,11,.12)",borderRadius:5,padding:"2px 6px"}}>🛡 ${wA.toFixed(2)} back</span>}
                {res==="tie"&&!ins&&<span className="mn" style={{fontSize:"var(--fs-small)",fontWeight:700,color:"var(--red)"}}>-${bet}</span>}
                {res==="lose"&&<span className="mn" style={{fontSize:"var(--fs-small)",fontWeight:700,color:"var(--red)"}}>-${bet}</span>}
                {hist.length>0&&hist[0]&&hist[0].bonusWin&&(
                  <span style={{fontSize:"var(--fs-small)",fontWeight:800,color:"var(--purple)",background:"rgba(168,85,247,.15)",border:"1px solid rgba(168,85,247,.25)",borderRadius:6,padding:"2px 7px"}}>BONUS 🎯</span>
                )}
              </div>
            )}
          </div>
        </div>

      {/* Roll button */}
      <button className="bt roll-btn" onClick={doRoll} disabled={ph!=="idle"}
        style={{width:"100%",padding:"var(--pad) 0",borderRadius:"var(--radius)",fontSize:"var(--fs-roll)",fontWeight:900,letterSpacing:3,color:"white",
          background:ph==="idle"?"linear-gradient(135deg,var(--green-d),var(--green),var(--green-d))":"linear-gradient(135deg,#252040,#1a1630)",
          backgroundSize:ph==="idle"?"200% auto":"100% auto",
          animation:ph==="idle"&&can?"shm 2.5s linear infinite":"none",
          boxShadow:ph==="idle"&&can?"0 6px 28px rgba(46,213,115,.25),inset 0 1px 0 rgba(255,255,255,.15)":"none",
          opacity:ph!=="idle"?.35:1}}>
        {ph==="idle"?"🎲  ROLL":"ROLLING..."}
      </button>
    </div>

    <div className="controls-row">
    {/* ═══ 2. DICE COUNT SELECTOR ═══ */}
    <section className="cd" style={{padding:"var(--pad)",marginBottom:"var(--gap)"}}>
      <div className="lb" style={{marginBottom:"var(--gap)"}}>DICE COUNT & MULTIPLIER</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"var(--gap)"}}>
        {[{c:1,l:"High Risk",m:"10.26x",clr:"var(--red)"},{c:2,l:"Medium",m:"2.14x",clr:"var(--amber)"},{c:3,l:"Low Risk",m:"1.22x",clr:"var(--green)"}].map(o=>{
          const sel=dc===o.c;
          return(
            <button key={o.c} className="bt dc-btn" onClick={()=>{setDc(o.c);if(ph==="idle")sPD(Array(o.c).fill(null));}} disabled={ph!=="idle"}
              style={{padding:"var(--gap) 4px",borderRadius:10,color:"var(--tx)",textAlign:"center",
                border:"2px solid "+(sel?(o.clr||"rgba(255,255,255,.25)"):"transparent"),
                background:sel?(o.clr||"var(--elev)"):"var(--bg)",opacity:ph!=="idle"?.45:1,transition:"all .2s"}}>
              <div style={{fontSize:"var(--fs-dice-count)",fontWeight:900,lineHeight:1.1}}>{o.c}</div>
              <div style={{fontSize:"var(--fs-small)",color:sel?"rgba(255,255,255,.7)":"var(--tx3)",fontWeight:600,marginTop:1}}>{o.l}</div>
              <div className="mn" style={{fontSize:"var(--fs-mult)",fontWeight:800,color:sel&&o.clr?"white":"var(--tx)",marginTop:2}}>{o.m}</div>
            </button>
          );
        })}
      </div>
    </section>

    {/* ═══ 3. BET CONTROLS ═══ */}
    <section className="cd" style={{padding:"var(--pad)",marginBottom:"var(--gap)"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
        <span className="lb" style={{textAlign:"left"}}>BET AMOUNT</span>
        <span className="mn" style={{fontSize:"var(--fs-small)",color:"var(--tx3)",fontWeight:600}}>Total: <strong style={{color:"var(--tx)"}}>${tBet.toFixed(2)}</strong></span>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:"var(--gap)"}}>
        <button className="bt ct" onClick={()=>setBet(p=>{
          if(p<=1)return 1;if(p<=5)return p-1;if(p<=20)return p-5;if(p<=100)return p-10;if(p<=500)return p-50;return p-100;
        })}>−</button>
        <input className="mn" type="number" min="1" max={Math.floor(bal)} value={bet}
          onChange={e=>{const v=parseInt(e.target.value);if(!isNaN(v)&&v>=0)setBet(Math.min(v,Math.floor(bal)));if(e.target.value==="")setBet(0);}}
          onBlur={()=>{if(bet<1)setBet(1);}}
          style={{flex:1,height:"var(--btn-h)",borderRadius:8,background:"var(--bg)",border:"1px solid var(--brd)",
            color:"var(--tx)",textAlign:"center",fontSize:"var(--fs-body)",fontWeight:800,outline:"none",
            WebkitAppearance:"none",MozAppearance:"textfield",padding:"0 8px"}}/>
        <button className="bt ct" onClick={()=>setBet(p=>{
          const mx=Math.floor(bal);if(p<5)return Math.min(p+1,mx);if(p<20)return Math.min(p+5,mx);if(p<100)return Math.min(p+10,mx);if(p<500)return Math.min(p+50,mx);return Math.min(p+100,mx);
        })}>+</button>
        <button className="bt ct" onClick={()=>setBet(p=>Math.max(1,Math.round(p/2)))} style={{background:"linear-gradient(135deg,var(--orange),#ea580c)",border:"none"}}>÷</button>
        <button className="bt ct" onClick={()=>setBet(p=>Math.min(Math.round(p*2),Math.floor(bal)))} style={{background:"linear-gradient(135deg,var(--blue),#2563eb)",border:"none",fontSize:"var(--fs-body)",fontWeight:800}}>2x</button>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"var(--gap)"}}>
        <button className="bt sp-btn" onClick={()=>setIns(!ins)} disabled={ph!=="idle"}
          style={{padding:"var(--gap) 6px",borderRadius:10,color:"white",textAlign:"center",
            border:"2px solid "+(ins?"var(--amber)":"transparent"),
            background:ins?"linear-gradient(135deg,var(--amber-d),#6b4a00)":"var(--bg)",opacity:ph!=="idle"?.45:1}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:5}}>
            <span style={{fontSize:"var(--fs-body)"}}>🛡</span>
            <span style={{fontSize:"var(--fs-body)",fontWeight:700}}>Insure Tie</span>
            <span style={{fontSize:"var(--fs-small)",color:ins?"rgba(255,255,255,.6)":"var(--tx3)",fontWeight:600}}>+25%</span>
          </div>
        </button>
        <button className="bt sp-btn" onClick={()=>{if(bonAvailable){setBon(!bon);if(!bon)setBonA(Math.max(1,Math.floor(bet/2)));}}} disabled={ph!=="idle"||!bonAvailable}
          style={{padding:"var(--gap) 6px",borderRadius:10,color:"white",textAlign:"center",
            border:"2px solid "+(bon&&bonAvailable?"var(--purple)":"transparent"),
            background:bon&&bonAvailable?"linear-gradient(135deg,var(--purple-d),#5b21b6)":"var(--bg)",
            opacity:ph!=="idle"||!bonAvailable?.35:1}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:5}}>
            <span style={{fontSize:"var(--fs-body)"}}>✦</span>
            <span style={{fontSize:"var(--fs-body)",fontWeight:700}}>Bonus Bet</span>
            <span className="mn" style={{fontSize:"var(--fs-small)",color:bon&&bonAvailable?"rgba(255,255,255,.6)":"var(--tx3)",fontWeight:600}}>{bonAvailable?"$"+effectiveBonA:"2+ Dice"}</span>
          </div>
        </button>
      </div>

      {bon&&bonAvailable&&(
        <div style={{marginTop:"var(--gap)",animation:"su .2s ease"}}>
          <div className="lb" style={{marginBottom:4,textAlign:"left"}}>BONUS BET (Max ${maxBon} = half of ${bet})</div>
          <div style={{display:"flex",alignItems:"center",gap:4}}>
            <button className="bt ct" onClick={()=>setBonA(p=>Math.max(1,p-1))}>−</button>
            <input className="mn" type="number" min="1" max={maxBon} value={effectiveBonA}
              onChange={e=>{const v=parseInt(e.target.value);if(!isNaN(v)&&v>=0)setBonA(Math.min(v,maxBon));if(e.target.value==="")setBonA(0);}}
              onBlur={()=>{if(bonA<1)setBonA(1);}}
              style={{flex:1,height:"var(--btn-h)",borderRadius:8,background:"var(--bg)",border:"1px solid var(--brd)",
                color:"var(--tx)",textAlign:"center",fontSize:"var(--fs-body)",fontWeight:800,outline:"none",
                WebkitAppearance:"none",MozAppearance:"textfield",padding:"0 6px"}}/>
            <button className="bt ct" onClick={()=>setBonA(p=>Math.min(maxBon,p+1))}>+</button>
          </div>
        </div>
      )}
    </section>
    </div>{/* end controls-row */}

    {/* ═══ 4. STATS + HISTORY ═══ */}
    <section className="cd" style={{padding:"var(--pad)"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"var(--gap)"}}>
        <span style={{fontSize:"var(--fs-body)",fontWeight:800}}>Game History</span>
        {hist.length>0&&<button className="bt" onClick={()=>sHist([])} style={{fontSize:"var(--fs-small)",color:"var(--tx3)",background:"var(--elev)",border:"1px solid var(--brd)",borderRadius:8,padding:"4px 10px",fontWeight:600}}>Clear</button>}
      </div>

      <Stats hist={hist}/>

      {/* Roll-by-roll history as readable rows */}
      {hist.length>0?(
        <div style={{maxHeight:240,overflowY:"auto",borderRadius:8,border:"1px solid var(--brd)"}}>
          {/* Table header */}
          <div style={{display:"grid",gridTemplateColumns:"30px 1fr 44px 44px 1fr",gap:0,padding:"6px var(--gap)",background:"var(--elev)",borderBottom:"1px solid var(--brd)",position:"sticky",top:0,zIndex:1}}>
            <span style={{fontSize:"var(--fs-small)",fontWeight:700,color:"var(--tx3)",letterSpacing:1}}>#</span>
            <span style={{fontSize:"var(--fs-small)",fontWeight:700,color:"var(--tx3)",letterSpacing:1}}>RESULT</span>
            <span style={{fontSize:"var(--fs-small)",fontWeight:700,color:"var(--tx3)",letterSpacing:1,textAlign:"center"}}>YOU</span>
            <span style={{fontSize:"var(--fs-small)",fontWeight:700,color:"var(--tx3)",letterSpacing:1,textAlign:"center"}}>DLR</span>
            <span style={{fontSize:"var(--fs-small)",fontWeight:700,color:"var(--tx3)",letterSpacing:1,textAlign:"right"}}>PAYOUT</span>
          </div>
          {/* Rows */}
          {hist.map((h,i)=>{
            const isWin=h.out==="win";
            const isTie=h.out==="tie";
            const rowBg=i%2===0?"transparent":"rgba(255,255,255,.015)";
            return(
              <div key={i} style={{display:"grid",gridTemplateColumns:"30px 1fr 44px 44px 1fr",gap:0,padding:"7px var(--gap)",background:rowBg,borderBottom:i<hist.length-1?"1px solid rgba(255,255,255,.03)":"none",
                animation:i===0?"sIn .25s ease":"none"}}>
                {/* Round number */}
                <span className="mn" style={{fontSize:"var(--fs-small)",color:"var(--tx3)",fontWeight:600}}>{h.num||hist.length-i}</span>
                {/* Result badge */}
                <div style={{display:"flex",alignItems:"center",gap:4}}>
                  <div style={{width:6,height:6,borderRadius:"50%",flexShrink:0,
                    background:isWin?"var(--green)":isTie?"var(--amber)":"var(--red)",
                    boxShadow:isWin?"0 0 4px var(--green)":isTie?"0 0 4px var(--amber)":"0 0 4px var(--red)"}}/>
                  <span style={{fontSize:"var(--fs-body)",fontWeight:800,
                    color:isWin?"var(--green)":isTie?"var(--amber)":"var(--red)"}}>
                    {isWin?"Win":isTie?(h.pay>0?"Insured":"Loss"):"Loss"}
                  </span>
                  {h.dc&&<span style={{fontSize:"var(--fs-small)",color:"var(--tx3)",fontWeight:600,background:"var(--elev)",borderRadius:3,padding:"1px 4px"}}>{h.dc}D</span>}
                  {h.bonusWin&&<span style={{fontSize:"var(--fs-small)",color:"var(--purple)",fontWeight:800,background:"rgba(168,85,247,.15)",borderRadius:3,padding:"1px 4px"}}>BONUS</span>}
                </div>
                {/* Player total */}
                <span className="mn" style={{fontSize:"var(--fs-body)",fontWeight:800,textAlign:"center",color:isWin?"var(--green)":isTie?"var(--amber)":"var(--tx2)"}}>{h.pt}</span>
                {/* Dealer total */}
                <span className="mn" style={{fontSize:"var(--fs-body)",fontWeight:800,textAlign:"center",color:"var(--tx3)"}}>{h.dt}</span>
                {/* Payout */}
                <span className="mn" style={{fontSize:"var(--fs-small)",fontWeight:700,textAlign:"right",
                  color:h.pay>0?"var(--green)":isTie&&h.pay===0?"var(--amber)":"var(--red)"}}>
                  {h.pay>0?"+$"+h.pay.toFixed(2):"-$"+h.bet.toFixed(2)}
                </span>
              </div>
            );
          })}
        </div>
      ):(
        <div style={{textAlign:"center",padding:"var(--pad) 0",borderRadius:10,border:"1px solid var(--brd)"}}>
          <div style={{fontSize:28,marginBottom:8}}>🎲</div>
          <div style={{fontSize:"var(--fs-body)",color:"var(--tx3)",fontWeight:600}}>No rolls yet</div>
          <div style={{fontSize:"var(--fs-small)",color:"var(--tx3)",marginTop:4,opacity:.6}}>Hit ROLL to start playing!</div>
        </div>
      )}
    </section>

    {/* ═══ MODALS ═══ */}
    {how&&<HowTo onClose={()=>sHow(false)}/>}
    {alrt&&(
      <div className="ov" onClick={()=>sAlrt(false)}>
        <div className="ac" onClick={e=>e.stopPropagation()}>
          <div style={{fontSize:48,marginBottom:12,animation:"fl 2s ease-in-out infinite"}}>💰</div>
          <h2 style={{fontSize:"var(--fs-title)",fontWeight:900,color:"var(--red)",marginBottom:8}}>Insufficient Balance</h2>
          <p style={{fontSize:"var(--fs-body)",color:"var(--tx2)",lineHeight:1.6,marginBottom:22}}>
            Balance: <strong className="mn" style={{color:"var(--tx)"}}>${bal.toFixed(2)}</strong><br/>
            Bet required: <strong className="mn" style={{color:"var(--tx)"}}>${tBet.toFixed(2)}</strong><br/>
            <span style={{display:"inline-block",marginTop:6}}>Lower your bet to continue.</span>
          </p>
          <button className="bt" onClick={()=>sAlrt(false)} style={{padding:"var(--pad) 36px",borderRadius:"var(--radius)",fontSize:"var(--fs-body)",fontWeight:800,color:"white",background:"linear-gradient(135deg,#7C3AED,var(--purple))",boxShadow:"0 4px 16px rgba(124,58,237,.3)"}}>Got It</button>
        </div>
      </div>
    )}
    <div style={{height:20}}/>
  </>);
}

ReactDOM.render(React.createElement(Game),document.getElementById("R"));
</script>
</body>
</html>
